name: Documentation issue
description: Report confusing, missing, or outdated BDS documentation.
title: "[docs] "
labels: ["documentation"]
body:
  - type: textarea
    id: page
    attributes:
      label: Page or section
      description: Link or name the README/docs page, section, notebook, or example.
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What was confusing, missing, or incorrect?
    validations:
      required: true
  - type: textarea
    id: suggested
    attributes:
      label: Suggested change
      description: Optional wording, command, or example that would help.
